<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 Aura - Ultimate Masterpiece</title>
    <!-- Diese Scripte erlauben es React und 3D direkt im Browser ohne Installation zu nutzen -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://fonts.cdnfonts.com/s/19907/Minecraft.woff') format('woff');
        }
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Minecraft', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .lilygo-case {
            position: relative;
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 10px solid #333;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            padding: 15px;
            width: 850px;
            max-width: 95vw;
            aspect-ratio: 320 / 170;
            border-bottom: 15px solid #222;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 4px solid #000;
            cursor: pointer;
        }
        .hw-btn {
            position: absolute;
            right: -25px;
            width: 20px;
            height: 50px;
            background: #252525;
            border: 3px solid #444;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
        }
        .btn-top { top: 40px; }
        .boiler-shake {
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(-50.5%, -49.5%) rotate(-0.5deg); }
            100% { transform: translate(-49.5%, -50.5%) rotate(0.5deg); }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ZapIcon = () => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="yellow" strokeWidth="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
    );

    const VolumeIcon = ({enabled}) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            {enabled ? (
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            ) : (
                <g>
                    <line x1="23" y1="9" x2="17" y2="15"/>
                    <line x1="17" y1="9" x2="23" y2="15"/>
                </g>
            )}
        </svg>
    );

    const App = () => {
        const containerRef = useRef(null);
        const [count, setCount] = useState(0);
        const [isBoiling, setIsBoiling] = useState(false);
        const [auraPoints, setAuraPoints] = useState(0);
        const [bridgeData, setBridgeData] = useState({ status: "BEREIT", rank: "Lauch", comment: "Warte auf Klick..." });
        const [loading, setLoading] = useState(false);
        const [audioEnabled, setAudioEnabled] = useState(false);
        const [errorMessage, setErrorMessage] = useState("");
        
        // Key-Management: Schaut ob ein Key im Browser gespeichert ist
        const [apiKey, setApiKey] = useState(() => localStorage.getItem("gemini_aura_key") || "");
        const [keyInput, setKeyInput] = useState("");
        const [showKeyModal, setShowKeyModal] = useState(!localStorage.getItem("gemini_aura_key"));

        // Retry-Logik für API Calls
        const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw error;
            }
        };

        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmData.length, true);
            writeString(8, 'WAVE'); writeString(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data'); view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const speak = async (text) => {
            if (!audioEnabled || !text || !apiKey) return;
            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Sprich als cooler Minecraft-Charakter: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            }
                        })
                    }
                );
                const inlineData = result.candidates[0].content.parts[0].inlineData;
                const audioUrl = URL.createObjectURL(pcmToWav(Uint8Array.from(atob(inlineData.data), c => c.charCodeAt(0)), parseInt(inlineData.mimeType.split('rate=')[1]) || 24000));
                await new Audio(audioUrl).play();
            } catch (e) { console.error(e); }
        };

        const lobsterGroup = useRef(null);
        const b6Ref = useRef(null);
        const b7Ref = useRef(null);
        const rendererRef = useRef(null);

        useEffect(() => {
            if (!containerRef.current) return;
            const timer = setTimeout(() => {
                const width = containerRef.current.clientWidth;
                const height = containerRef.current.clientHeight;
                if (width === 0 || height === 0) return;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x4dbbff);
                const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
                renderer.setSize(width, height);
                containerRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                scene.add(new THREE.AmbientLight(0xffffff, 1.4));
                const sun = new THREE.DirectionalLight(0xffffff, 1.0);
                sun.position.set(10, 20, 15); scene.add(sun);

                // Boden
                const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
                for (let x = -10; x <= 10; x++) {
                    for (let z = -6; z <= 6; z++) {
                        const mat = new THREE.MeshLambertMaterial({ color: (x + z) % 2 === 0 ? 0x5aa351 : 0x4e8d46 });
                        const block = new THREE.Mesh(cubeGeo, mat);
                        block.position.set(x, -2.5, z); scene.add(block);
                    }
                }

                // LOBSTER
                const lobster = new THREE.Group();
                const red = new THREE.MeshLambertMaterial({ color: 0xe63946 });
                const darkRed = new THREE.MeshLambertMaterial({ color: 0x9b2226 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.8, 2.2), red);
                lobster.add(body);
                for (let i = 1; i <= 4; i++) {
                    const s = new THREE.Mesh(new THREE.BoxGeometry(3.0 - i*0.4, 1.4 - i*0.1, 1.6), red);
                    s.position.set(0, -0.2, -0.8 - i*0.8); lobster.add(s);
                }
                const createEye = (x) => {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshLambertMaterial({color: 0xffffff})));
                    const p = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.2), new THREE.MeshLambertMaterial({color: 0x000}));
                    p.position.z = 0.45; g.add(p);
                    g.position.set(x, 1.6, 1.0); g.pupil = p; return g;
                };
                lobster.eL = createEye(-0.9); lobster.eR = createEye(0.9);
                lobster.add(lobster.eL, lobster.eR);
                const createClaw = (side) => {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.6), red));
                    const p = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.2, 2.0), darkRed);
                    p.position.set(0, 0, 1.6); g.add(p);
                    g.position.set(side * 3.5, 0.5, 1.0); return g;
                };
                lobster.armL = createClaw(-1); lobster.armR = createClaw(1);
                lobster.add(lobster.armL, lobster.armR);
                lobster.position.set(0, -1.0, 0); lobster.scale.set(1.4, 1.4, 1.4);
                scene.add(lobster); lobsterGroup.current = lobster;

                const createBlock = (text) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0,0,128,128);
                    ctx.fillStyle = 'black'; ctx.font = 'bold 90px Arial';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(text, 64, 64);
                    return new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 1.6), new THREE.MeshLambertMaterial({map: new THREE.CanvasTexture(canvas)}));
                };
                b6Ref.current = createBlock("6"); b7Ref.current = createBlock("7");
                scene.add(b6Ref.current, b7Ref.current);

                camera.position.set(0, 4, 12); camera.lookAt(0, 1, 0);

                const animate = () => {
                    const t = Date.now() * 0.002;
                    requestAnimationFrame(animate);
                    if (lobsterGroup.current && !isBoiling) {
                        lobsterGroup.current.position.y = Math.sin(t * 3.5) * 0.2 - 1.0;
                        const spd = 2.8;
                        const jX = Math.sin(t * spd) * 4.8;
                        const jY = Math.abs(Math.cos(t * spd)) * 6.0 + 2;
                        b6Ref.current.position.set(jX, jY, 3);
                        b7Ref.current.position.set(-jX, Math.abs(Math.cos(t * spd + Math.PI)) * 6.0 + 2, 3);
                        lobsterGroup.current.armL.rotation.x = Math.sin(t * spd) * 0.9;
                        lobsterGroup.current.armR.rotation.x = Math.sin(t * spd + Math.PI) * 0.9;
                        const eyeX = Math.sin(t * spd) * 0.25;
                        lobsterGroup.current.eL.pupil.position.x = eyeX;
                        lobsterGroup.current.eR.pupil.position.x = eyeX;
                    } else if (isBoiling) {
                        camera.position.x = (Math.random() - 0.5) * 0.8;
                        lobsterGroup.current.rotation.y += 0.15;
                    }
                    renderer.render(scene, camera);
                };
                animate();
            }, 100);
            return () => { clearTimeout(timer); if(rendererRef.current) rendererRef.current.dispose(); };
        }, [isBoiling]);

        const callBridge = async (current) => {
            if (loading || !apiKey) return;
            setLoading(true); setErrorMessage("");
            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Aura Check: ${current}. Antworte NUR JSON: {status:string, rank:string, comment:string}` }] }],
                            systemInstruction: { parts: [{ text: "Du bist eine Snapy-Cloud-Bridge. Antworte nur in validem JSON." }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    }
                );
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                setBridgeData(data); speak(data.comment);
            } catch (e) { setErrorMessage("API Verbindung fehlgeschlagen."); }
            setLoading(false);
        };

        const handleAction = () => {
            if (isBoiling || showKeyModal) return;
            const next = count + 1; setCount(next); setAuraPoints(p => p + 67);
            if (next === 1 || next % 10 === 0 || next === 67) callBridge(next);
            if (next === 67) {
                setIsBoiling(true);
                setTimeout(() => { setCount(0); setIsBoiling(false); setAuraPoints(0); }, 7000);
            }
        };

        const saveKey = () => {
            if(keyInput.trim()) {
                localStorage.setItem("gemini_aura_key", keyInput.trim());
                setApiKey(keyInput.trim()); setShowKeyModal(false);
                window.location.reload();
            }
        };

        return (
            <div className="flex flex-col items-center relative">
                {showKeyModal && (
                    <div className="absolute inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center p-6 rounded-[40px] border-4 border-zinc-700">
                        <div className="bg-zinc-900 p-6 border-4 border-black max-w-sm text-center shadow-[8px_8px_0_#000]">
                            <h2 className="text-orange-500 font-bold mb-2 text-lg">API KEY BENÖTIGT</h2>
                            <p className="text-[10px] text-zinc-400 mb-4">Dein Key wird nur lokal in deinem Browser gespeichert und niemals an GitHub gesendet.</p>
                            <input type="password" placeholder="AIzaSy..." value={keyInput} onChange={(e) => setKeyInput(e.target.value)}
                                className="w-full bg-black border-2 border-zinc-700 p-2 text-xs text-green-400 mb-4 focus:outline-none focus:border-green-500 font-sans" />
                            <button onClick={saveKey} className="bg-green-600 px-4 py-2 text-xs font-bold hover:bg-green-500 border-2 border-black active:translate-y-1">KEY SPEICHERN</button>
                        </div>
                    </div>
                )}
                <div className="lilygo-case">
                    <div className="hw-btn btn-top" onClick={() => { localStorage.removeItem("gemini_aura_key"); window.location.reload(); }}></div>
                    <div className="screen" onClick={handleAction}>
                        <div ref={containerRef} className="w-full h-full" />
                        <div className="absolute inset-0 pointer-events-none p-5 flex flex-col justify-between z-50">
                            <div className="flex justify-between items-start">
                                <div className="bg-black/60 p-2 border-b-2 border-r-2 border-zinc-700 text-[8px] max-w-[130px] backdrop-blur-sm">
                                    <div className="text-green-400 font-bold mb-1">SNAPY_BRIDGE_V3</div>
                                    <pre className="text-blue-300 overflow-hidden leading-tight">{JSON.stringify(bridgeData, null, 1)}</pre>
                                </div>
                                <div className="text-right">
                                    <div className={`text-6xl font-black drop-shadow-[5px_5px_0_#000] ${count >= 64 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{count} / 64</div>
                                    <div className="text-yellow-400 font-bold text-lg tracking-widest drop-shadow-[2px_2px_0_#000]">AURA: {auraPoints.toLocaleString()}</div>
                                </div>
                            </div>
                            <div className="flex justify-between items-end">
                                <div className="bg-black/60 p-3 border-t-2 border-r-2 border-zinc-700 max-w-[250px] backdrop-blur-sm">
                                    <div className="text-[8px] text-zinc-500 uppercase font-bold italic mb-1">Kommentar:</div>
                                    <p className="text-[12px] text-white italic leading-tight">"{bridgeData.comment}"</p>
                                </div>
                                <ZapIcon />
                            </div>
                        </div>
                        {isBoiling && (
                            <div className="absolute inset-0 bg-orange-600/30 flex items-center justify-center boiler-shake z-[100] backdrop-blur-sm">
                                <div className="bg-white text-black p-10 border-8 border-black text-center -rotate-6 shadow-[15px_15px_0_#000]">
                                    <div className="text-6xl font-black text-center">OK BOILER!</div>
                                    <div className="text-2xl font-bold mt-3 text-center">AURA OVERHEAT 67</div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
                <div className="mt-8 flex gap-6">
                    <button onClick={() => setAudioEnabled(!audioEnabled)} className={`px-8 py-3 rounded-full font-bold shadow-2xl transition-all flex items-center gap-3 ${audioEnabled ? 'bg-green-600 hover:bg-green-500' : 'bg-red-600 hover:bg-red-500'}`}>
                        <VolumeIcon enabled={audioEnabled} /> {audioEnabled ? 'SOUND AN' : 'SOUND AUS'}
                    </button>
                    <button onClick={() => { localStorage.removeItem("gemini_aura_key"); window.location.reload(); }} className="px-6 py-3 bg-zinc-800 border border-zinc-700 rounded-full text-[10px] font-bold hover:bg-zinc-700 transition-all">KEY RESET</button>
                </div>
            </div>
        );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
