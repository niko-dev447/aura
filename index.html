<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 Aura - Ultimate Masterpiece V10</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://fonts.cdnfonts.com/s/19907/Minecraft.woff') format('woff');
        }
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Minecraft', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .app-shell {
            width: min(940px, 100vw);
            min-height: 100vh;
            padding: clamp(14px, 3vw, 28px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vh, 28px);
            box-sizing: border-box;
        }
        .lilygo-case {
            position: relative;
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 10px solid #333;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            padding: 15px;
            width: 850px;
            max-width: 95vw;
            aspect-ratio: 320 / 170;
            border-bottom: 15px solid #222;
            flex: 0 0 auto;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 4px solid #000;
            cursor: pointer;
        }
        .hw-btn {
            position: absolute;
            right: -25px;
            width: 20px;
            height: 50px;
            background: #252525;
            border: 3px solid #444;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
        }
        .btn-top { top: 40px; }
        .boiler-shake {
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(-2px, 1px) rotate(-0.5deg); }
            100% { transform: translate(2px, -1px) rotate(0.5deg); }
        }
        .loader {
            width: 12px;
            height: 12px;
            border: 2px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hud-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: clamp(10px, 2.3vw, 20px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 50;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .bridge-panel {
            background: rgba(0,0,0,0.62);
            border-right: 2px solid #3f3f46;
            border-bottom: 2px solid #3f3f46;
            backdrop-filter: blur(4px);
            padding: 8px;
            width: min(180px, 34%);
            font-size: clamp(7px, 1.05vw, 9px);
            line-height: 1.25;
            overflow: hidden;
        }
        .score-panel {
            text-align: right;
            min-width: 125px;
        }
        .counter {
            font-size: clamp(28px, 6vw, 60px);
            font-weight: 900;
            line-height: 0.95;
            text-shadow: 5px 5px 0 #000;
            white-space: nowrap;
        }
        .aura-score {
            color: #facc15;
            font-size: clamp(10px, 2vw, 18px);
            font-weight: 800;
            letter-spacing: 0;
            text-shadow: 2px 2px 0 #000;
            margin-top: 4px;
        }
        .combo-row {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 8px;
            font-size: clamp(8px, 1.35vw, 12px);
        }
        .pill {
            background: rgba(0,0,0,0.68);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 5px 7px;
            white-space: nowrap;
        }
        .hud-bottom {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: end;
        }
        .comment-panel {
            background: rgba(0,0,0,0.62);
            border-right: 2px solid #3f3f46;
            border-top: 2px solid #3f3f46;
            backdrop-filter: blur(4px);
            padding: 10px;
            max-width: 330px;
            font-size: clamp(10px, 1.55vw, 13px);
            line-height: 1.22;
        }
        .timing-panel {
            width: min(330px, 42vw);
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.16);
            padding: 8px 10px 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
        }
        .timing-meta {
            display: flex;
            justify-content: space-between;
            color: #e5e7eb;
            font-size: clamp(7px, 1.15vw, 10px);
            margin-bottom: 7px;
        }
        .timing-track {
            position: relative;
            height: 14px;
            background: linear-gradient(90deg, #7f1d1d, #ca8a04 36%, #22c55e 58%, #ca8a04 78%, #7f1d1d);
            border: 2px solid #000;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
            overflow: hidden;
        }
        .timing-zone {
            position: absolute;
            left: 58%;
            top: 0;
            width: 18%;
            height: 100%;
            background: rgba(255,255,255,0.42);
            box-shadow: 0 0 16px rgba(255,255,255,0.7);
        }
        .timing-marker {
            position: absolute;
            top: -5px;
            width: 6px;
            height: 24px;
            background: #fff;
            border: 1px solid #000;
            box-shadow: 0 0 10px #fff;
            transform: translateX(-50%);
        }
        .voice-bar {
            height: 5px;
            margin-top: 8px;
            background: #18181b;
            border: 1px solid #3f3f46;
            overflow: hidden;
        }
        .voice-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #facc15);
            transition: width 160ms ease;
        }
        .last-hit {
            color: #fff;
        }
        .last-hit.PERFECT { color: #86efac; }
        .last-hit.GOOD { color: #fde047; }
        .last-hit.CRINGE { color: #fca5a5; }
        .sound-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .sound-btn {
            min-width: 178px;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 800;
            box-shadow: 0 20px 45px rgba(0,0,0,0.45);
            transition: transform 120ms ease, background 120ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sound-btn:hover {
            transform: translateY(-1px);
        }
        @media (max-width: 640px) {
            body {
                align-items: flex-start;
                overflow: hidden;
            }
            .app-shell {
                justify-content: flex-start;
                padding: 20px 10px 12px;
                gap: 18px;
            }
            .lilygo-case {
                width: 100%;
                max-width: 100vw;
                border-width: 7px;
                border-bottom-width: 11px;
                border-radius: 28px;
                padding: 8px;
                aspect-ratio: 10 / 7;
            }
            .screen {
                border-width: 3px;
                border-radius: 12px;
            }
            .hw-btn {
                right: -16px;
                width: 14px;
                height: 40px;
            }
            .hud-layer {
                padding: 8px;
            }
            .bridge-panel {
                width: 31%;
                max-height: 84px;
                font-size: 6px;
                padding: 6px;
            }
            .counter {
                font-size: clamp(28px, 11vw, 42px);
                text-shadow: 3px 3px 0 #000;
            }
            .aura-score {
                font-size: 10px;
            }
            .combo-row {
                gap: 4px;
                font-size: 7px;
                margin-top: 5px;
            }
            .pill {
                padding: 4px 5px;
            }
            .hud-bottom {
                grid-template-columns: 1fr;
                gap: 7px;
            }
            .comment-panel {
                max-width: none;
                padding: 7px;
                font-size: 9px;
                background: rgba(0,0,0,0.54);
            }
            .timing-panel {
                width: 100%;
                padding: 6px 7px 8px;
                background: rgba(0,0,0,0.58);
            }
            .timing-track {
                height: 12px;
            }
            .sound-btn {
                min-width: 160px;
                padding: 11px 20px;
            }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ZapIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="yellow" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const VolumeIcon = ({enabled}) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            {enabled ? <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/> : <g><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></g>}
        </svg>
    );
    const hitLines = {
        PERFECT: [
            "Perfect 67, Aura komplett am Glühen.",
            "Digga, das war pixelgenau wild.",
            "Rizz-Timing, absolut keine Diskussion."
        ],
        GOOD: [
            "Stabiler Hit, Aura steigt.",
            "Guter Move, weiter drücken digga.",
            "Nicht perfekt, aber schon Macher."
        ],
        CRINGE: [
            "Zu hektisch, Aura kurz cringe.",
            "Timing sus, einmal neu fokussieren.",
            "Fast daneben, aber wir kochen weiter."
        ]
    };
    const VOICE_MAX = 7;

    const App = () => {
        const containerRef = useRef(null);
        const [count, setCount] = useState(0);
        const [isBoiling, setIsBoiling] = useState(false);
        const [auraPoints, setAuraPoints] = useState(0);
        const [bridgeData, setBridgeData] = useState({ status: "IDLE", rank: "Lauch", comment: "Lobster lädt..." });
        const [loading, setLoading] = useState(false);
        const [audioEnabled, setAudioEnabled] = useState(false);
        const [errorMessage, setErrorMessage] = useState("");
        const [combo, setCombo] = useState(0);
        const [bestCombo, setBestCombo] = useState(0);
        const [voiceCharge, setVoiceCharge] = useState(0);
        const [heat, setHeat] = useState(0);
        const [lastHit, setLastHit] = useState({ grade: "READY", label: "Triff die helle Aura-Zone", gain: 0 });
        const [markerPosition, setMarkerPosition] = useState(0);

        const [apiKey, setApiKey] = useState(() => localStorage.getItem("gemini_aura_key") || "");
        const [showKeyPrompt, setShowKeyPrompt] = useState(!localStorage.getItem("gemini_aura_key"));
        const voiceRef = useRef(null);
        const bridgeRequestId = useRef(0);
        const gameStartRef = useRef(performance.now());
        const comboRef = useRef(0);
        const heatRef = useRef(0);

        useEffect(() => {
            const pickVoice = () => {
                const voices = window.speechSynthesis?.getVoices?.() || [];
                voiceRef.current =
                    voices.find(v => /^de/i.test(v.lang) && /natural|online|neural|google|conrad|katja/i.test(v.name)) ||
                    voices.find(v => /^de/i.test(v.lang)) ||
                    voices[0] ||
                    null;
            };

            pickVoice();
            if (window.speechSynthesis) {
                window.speechSynthesis.onvoiceschanged = pickVoice;
            }

            return () => {
                if (window.speechSynthesis?.onvoiceschanged === pickVoice) {
                    window.speechSynthesis.onvoiceschanged = null;
                }
            };
        }, []);

        const speak = (text) => {
            if (!audioEnabled || !text) return;
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                if (voiceRef.current) utterance.voice = voiceRef.current;
                utterance.pitch = 1.08;
                utterance.rate = 1.12;
                window.speechSynthesis.speak(utterance);
            } catch (e) { console.error(e); }
        };

        const getMarkerPosition = () => {
            const cycle = 1500;
            const phase = ((performance.now() - gameStartRef.current) % cycle) / cycle;
            return phase < 0.5 ? phase * 2 : (1 - phase) * 2;
        };

        const getTimingHit = () => {
            const marker = getMarkerPosition();
            const distance = Math.abs(marker - 0.67);
            if (distance <= 0.07) return { grade: "PERFECT", label: "PERFECT", multiplier: 3, heatGain: 12 };
            if (distance <= 0.18) return { grade: "GOOD", label: "GOOD", multiplier: 2, heatGain: 7 };
            return { grade: "CRINGE", label: "CRINGE", multiplier: 1, heatGain: -10 };
        };

        useEffect(() => {
            let frameId;
            const updateMarker = () => {
                setMarkerPosition(getMarkerPosition() * 100);
                frameId = requestAnimationFrame(updateMarker);
            };
            updateMarker();
            return () => cancelAnimationFrame(frameId);
        }, []);

        const listModels = async () => {
            if (!apiKey) return;
            setLoading(true);
            setErrorMessage("");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${res.status}`);
                }
                const data = await res.json();
                if (data.models) {
                    const names = data.models
                        .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                        .map(m => m.name.replace("models/", ""));
                    setErrorMessage(`Verfügbare Modelle: ${names.slice(0,5).join(", ")}`);
                } else {
                    throw new Error("Keine Modelle gefunden.");
                }
            } catch (e) { setErrorMessage(`Fehler: ${e.message}`); }
            setLoading(false);
        };

        const callBridge = async (current) => {
            if (!apiKey) return;
            const requestId = ++bridgeRequestId.current;
            setLoading(true);
            setErrorMessage("");
            try {
                const modelName = "gemini-2.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aura Check: ${current}/67, Combo ${comboRef.current}, Heat ${heatRef.current}. Antworte NUR als JSON ohne Markdown: {"status":"OK","rank":"Macher","comment":"maximal 10 Wörter, witzige deutsche Jugendsprache mit Begriffen wie digga, aura, 67, wild, cringe, rizz, sus. Nicht beleidigend."}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("Leere Gemini-Antwort.");

                const data = JSON.parse(text.replace(/^```json|```$/g, "").trim());
                if (requestId !== bridgeRequestId.current) return;
                setBridgeData({
                    status: data.status || "OK",
                    rank: data.rank || "Macher",
                    comment: data.comment || "Digga, stabile 67 Aura!"
                });
                speak(data.comment);
            } catch (e) { 
                setBridgeData({status: "FAIL", rank: "N/A", comment: "Cloud Offline"}); 
                console.warn("Cloud Bridge Error:", e);
            } finally {
                if (requestId === bridgeRequestId.current) setLoading(false);
            }
        };

        // --- 3D ENGINE ---
        const lobsterGroup = useRef(null);
        const b6Ref = useRef(null);
        const b7Ref = useRef(null);
        const animId = useRef(null);
        const rendererRef = useRef(null);
        const isBoilingRef = useRef(false);
        const sceneLayoutRef = useRef({ compact: false });

        useEffect(() => {
            isBoilingRef.current = isBoiling;
        }, [isBoiling]);

        useEffect(() => {
            if (!containerRef.current) return;
            
            // Timeout hilft React beim Layouting
            let resizeObserver = null;
            const timer = setTimeout(() => {
                const width = containerRef.current.clientWidth;
                const height = containerRef.current.clientHeight;
                if (width === 0 || height === 0) return;

                containerRef.current.innerHTML = '';
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x4dbbff);
                
                const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
                renderer.setSize(width, height);
                containerRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                scene.add(new THREE.AmbientLight(0xffffff, 1.2));
                const sun = new THREE.DirectionalLight(0xffffff, 1.0);
                sun.position.set(5, 15, 10);
                scene.add(sun);

                // Boden
                const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
                for (let x = -10; x <= 10; x++) {
                    for (let z = -6; z <= 6; z++) {
                        const mat = new THREE.MeshLambertMaterial({ color: (x + z) % 2 === 0 ? 0x5aa351 : 0x4e8d46 });
                        const block = new THREE.Mesh(cubeGeo, mat);
                        block.position.set(x, -2.5, z);
                        scene.add(block);
                    }
                }

                // LOBSTER MODELL
                const lobster = new THREE.Group();
                const red = new THREE.MeshLambertMaterial({ color: 0xe63946 });
                const darkRed = new THREE.MeshLambertMaterial({ color: 0x9b2226 });
                
                const body = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.6, 2.0), red);
                lobster.add(body);
                for (let i = 1; i <= 4; i++) {
                    const s = new THREE.Mesh(new THREE.BoxGeometry(2.8 - i*0.4, 1.3 - i*0.1, 1.5), red);
                    s.position.set(0, -0.2, -0.8 - i*0.8);
                    lobster.add(s);
                }
                const createEye = (x) => {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshLambertMaterial({color: 0xffffff})));
                    const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.2), new THREE.MeshLambertMaterial({color: 0x000}));
                    p.position.z = 0.35; g.add(p);
                    g.position.set(x, 1.4, 0.8); g.pupil = p;
                    return g;
                };
                lobster.eL = createEye(-0.8); lobster.eR = createEye(0.8);
                lobster.add(lobster.eL, lobster.eR);
                const createClaw = (side) => {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 1.5), red));
                    const p = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.1, 1.8), darkRed);
                    p.position.set(0, 0, 1.5); g.add(p);
                    g.position.set(side * 3.2, 0.5, 0.8);
                    return g;
                };
                lobster.armL = createClaw(-1); lobster.armR = createClaw(1);
                lobster.add(lobster.armL, lobster.armR);
                
                lobster.position.set(0, -0.8, 0);
                scene.add(lobster);
                lobsterGroup.current = lobster;

                const createBlock = (text) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0,0,128,128);
                    ctx.fillStyle = 'black'; ctx.font = 'bold 90px Arial';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(text, 64, 64);
                    return new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshLambertMaterial({map: new THREE.CanvasTexture(canvas)}));
                };
                b6Ref.current = createBlock("6"); b7Ref.current = createBlock("7");
                scene.add(b6Ref.current, b7Ref.current);

                const applyResponsiveScene = () => {
                    if (!containerRef.current) return;
                    const nextWidth = containerRef.current.clientWidth;
                    const nextHeight = containerRef.current.clientHeight;
                    if (!nextWidth || !nextHeight) return;
                    const compact = nextWidth < 520;
                    sceneLayoutRef.current = { compact };
                    renderer.setSize(nextWidth, nextHeight);
                    camera.aspect = nextWidth / nextHeight;
                    camera.updateProjectionMatrix();
                    camera.position.set(0, compact ? 4.3 : 3, compact ? 17 : 13);
                    camera.lookAt(0, compact ? 0.45 : 1, 0);
                    lobster.scale.setScalar(compact ? 0.72 : 1);
                };
                applyResponsiveScene();
                resizeObserver = new ResizeObserver(applyResponsiveScene);
                resizeObserver.observe(containerRef.current);

                const animate = () => {
                    const t = Date.now() * 0.002;
                    animId.current = requestAnimationFrame(animate);
                    const layout = sceneLayoutRef.current;
                    const jumpX = layout.compact ? 2.6 : 4.5;
                    const jumpY = layout.compact ? 2.2 : 5.5;
                    const jumpBase = layout.compact ? 1.35 : 2;
                    if (lobsterGroup.current && !isBoilingRef.current) {
                        camera.position.x = 0;
                        lobsterGroup.current.rotation.y = Math.sin(t) * 0.08;
                        lobsterGroup.current.position.y = Math.sin(t * 3.5) * 0.2 - 0.8;
                        const spd = 2.8;
                        const jX = Math.sin(t * spd) * jumpX;
                        const jY = Math.abs(Math.cos(t * spd)) * jumpY + jumpBase;
                        b6Ref.current.position.set(jX, jY, 3);
                        b7Ref.current.position.set(-jX, Math.abs(Math.cos(t * spd + Math.PI)) * jumpY + jumpBase, 3);
                        lobsterGroup.current.armL.rotation.x = Math.sin(t * spd) * 0.9;
                        lobsterGroup.current.armR.rotation.x = Math.sin(t * spd + Math.PI) * 0.9;
                    } else if (lobsterGroup.current && isBoilingRef.current) {
                        camera.position.x = (Math.random() - 0.5) * (layout.compact ? 0.35 : 0.6);
                        lobsterGroup.current.rotation.y += 0.15;
                    }
                    renderer.render(scene, camera);
                };
                animate();
                setBridgeData(d => ({...d, comment: "Lobster ist bereit!"}));
            }, 150);

            return () => {
                clearTimeout(timer);
                if (animId.current) cancelAnimationFrame(animId.current);
                if (resizeObserver) resizeObserver.disconnect();
                if (rendererRef.current) {
                    rendererRef.current.dispose();
                    rendererRef.current = null;
                }
                if (containerRef.current) containerRef.current.innerHTML = '';
            };
        }, []);

        const handleAction = () => {
            if (isBoiling || showKeyPrompt) return;
            const hit = getTimingHit();
            const next = count + 1;
            const nextCombo = hit.grade === "CRINGE" ? 0 : comboRef.current + 1;
            const auraGain = (67 * hit.multiplier) + Math.min(nextCombo, 20) * 5;
            const nextHeat = Math.max(0, Math.min(100, heatRef.current + hit.heatGain + (nextCombo >= 10 ? 3 : 0)));
            const linePool = hitLines[hit.grade];
            const localComment = linePool[(next + nextCombo) % linePool.length];

            comboRef.current = nextCombo;
            heatRef.current = nextHeat;
            setCount(next);
            setCombo(nextCombo);
            setBestCombo(v => Math.max(v, nextCombo));
            setHeat(nextHeat);
            setAuraPoints(p => p + auraGain);
            setLastHit({ grade: hit.grade, label: hit.label, gain: auraGain });
            setBridgeData(d => ({
                ...d,
                status: hit.grade,
                rank: nextCombo >= 12 ? "Aura Boss" : nextCombo >= 5 ? "Macher" : "Lauch",
                comment: localComment
            }));
            setVoiceCharge(v => {
                const charged = v + 1;
                const shouldSpeak = charged >= VOICE_MAX || hit.grade === "PERFECT" || next === 67;
                if (shouldSpeak) {
                    speak(localComment);
                    return 0;
                }
                return charged;
            });
            if (next % 15 === 0 || next === 67) {
                callBridge(next);
            }
            if (next === 67 || nextHeat >= 100) {
                setIsBoiling(true);
                speak("Boiler! 67 Aura komplett am Eskalieren.");
                setTimeout(() => {
                    setCount(0);
                    setIsBoiling(false);
                    setAuraPoints(0);
                    setCombo(0);
                    setVoiceCharge(0);
                    setHeat(0);
                    comboRef.current = 0;
                    heatRef.current = 0;
                    setLastHit({ grade: "READY", label: "Neue Runde, triff die Zone", gain: 0 });
                }, 7000);
            }
        };

        const saveKey = (key) => {
            const trimmedKey = key.trim();
            if (!trimmedKey) {
                setErrorMessage("Bitte erst einen Gemini API Key einfügen.");
                return;
            }
            localStorage.setItem("gemini_aura_key", trimmedKey);
            setApiKey(trimmedKey); setShowKeyPrompt(false);
            window.location.reload();
        };

        return (
            <div className="app-shell">
                {showKeyPrompt && (
                    <div className="absolute inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-zinc-900 p-8 border-4 border-zinc-700 max-w-sm rounded-2xl shadow-2xl">
                            <h2 className="text-orange-500 text-xl font-black mb-4 uppercase">API Key benötigt</h2>
                            <p className="text-[10px] text-zinc-400 mb-6 font-sans">Google Gemini API Key einfügen.</p>
                            <input id="key-in" type="password" placeholder="AIzaSy..." className="w-full bg-black border border-zinc-700 p-3 rounded mb-6 text-green-400 focus:outline-none focus:border-green-500 font-sans" />
                            <button onClick={() => saveKey(document.getElementById('key-in').value)} className="w-full bg-green-600 py-3 rounded font-bold hover:bg-green-500 transition-colors uppercase">Starten</button>
                        </div>
                    </div>
                )}

                <div className="mb-6 text-center select-none">
                    <h1 className="text-orange-500 text-3xl font-black tracking-widest uppercase">67 Aura Master</h1>
                    <p className="text-[10px] opacity-40 uppercase">Voxel Engine V10 - Combo Rhythm</p>
                </div>

                <div className="lilygo-case">
                    <div className="hw-btn btn-top" onClick={() => { localStorage.removeItem("gemini_aura_key"); window.location.reload(); }} title="Reset Key"></div>
                    <div className="screen" onClick={handleAction}>
                        <div ref={containerRef} className="w-full h-full" />
                        <div className="hud-layer">
                            <div className="hud-top">
                                <div className="bridge-panel">
                                    <div className="text-green-400 font-bold mb-1 tracking-tighter uppercase flex items-center gap-1">
                                        BRIDGE_V10 {loading && <span className="loader ml-1"></span>}
                                    </div>
                                    <pre className="text-blue-300 overflow-hidden">{JSON.stringify(bridgeData, null, 1)}</pre>
                                </div>
                                <div className="score-panel">
                                    <div className={`counter ${count >= 64 || heat >= 92 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{count} / 67</div>
                                    <div className="aura-score">AURA: {auraPoints.toLocaleString()}</div>
                                    <div className="combo-row">
                                        <span className="pill">COMBO x{combo}</span>
                                        <span className="pill">HEAT {heat}%</span>
                                    </div>
                                </div>
                            </div>
                            <div className="hud-bottom">
                                <div className="comment-panel">
                                    <p className="italic">"{bridgeData.comment}"</p>
                                    <div className={`last-hit ${lastHit.grade} mt-2`}>{lastHit.label} {lastHit.gain ? `+${lastHit.gain}` : ""} | BEST x{bestCombo}</div>
                                </div>
                                <div className="timing-panel">
                                    <div className="timing-meta">
                                        <span>VOICE {VOICE_MAX - voiceCharge}</span>
                                        <span>PERFECT ZONE</span>
                                    </div>
                                    <div className="timing-track">
                                        <div className="timing-zone"></div>
                                        <div className="timing-marker" style={{left: `${markerPosition}%`}}></div>
                                    </div>
                                    <div className="voice-bar">
                                        <div className="voice-fill" style={{width: `${(voiceCharge / VOICE_MAX) * 100}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {isBoiling && (
                            <div className="absolute inset-0 bg-orange-600/30 flex items-center justify-center boiler-shake z-[100] backdrop-blur-sm">
                                <div className="bg-white text-black p-10 border-8 border-black text-center -rotate-6 shadow-[15px_15px_0_#000]">
                                    <div className="text-6xl font-black">OK BOILER!</div>
                                    <div className="text-2xl font-bold mt-3">AURA OVERHEAT 67</div>
                                </div>
                            </div>
                        )}

                        {errorMessage && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-red-900/95 p-5 border-2 border-red-500 text-[10px] text-center pointer-events-auto max-w-xs z-[150] shadow-2xl rounded-lg">
                                <div className="font-bold underline text-white mb-2 uppercase italic tracking-widest">Info:</div>
                                <div className="text-white mb-4 leading-tight">{errorMessage}</div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={listModels} className="bg-white text-black py-2 rounded font-bold uppercase text-[8px] hover:bg-zinc-200">Refetch Models</button>
                                    <button onClick={() => setErrorMessage("")} className="underline uppercase text-white opacity-60 hover:opacity-100">Schließen</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>

                <div className="sound-row">
                    <button onClick={() => setAudioEnabled(!audioEnabled)} className={`sound-btn ${audioEnabled ? 'bg-green-600 hover:bg-green-500' : 'bg-red-600 hover:bg-red-500'}`}>
                        <VolumeIcon enabled={audioEnabled} /> {audioEnabled ? 'SOUND AN' : 'SOUND AUS'}
                    </button>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
